<!DOCTYPE html>
<html>
<head>
<title>Sea2Screen</title>

<style>

body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(to bottom,#0077b6,#90e0ef);
font-family:Arial;
}

.logo{
width:220px;
height:220px;
border-radius:50%;
cursor:pointer;
transition:0.5s;
}

.logo:hover{
transform:scale(1.1);
}

h1{
text-align:center;
color:white;
}

.container{
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<a href="index.html">
<img src="logo.jpeg" class="logo">
</a>

<h1>Sea2Screen</h1>

<p>Click Logo to Enter</p>

</div>

</body>
</html>
